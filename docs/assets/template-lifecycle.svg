<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Template lifecycle flow diagram</title>
  <desc id="desc">A five-step flow: choose template, preview files, configure environment, run checks, and customize with AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="88" text-anchor="middle" fill="#e5e7eb" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">Project Template Lifecycle</text>
  <g font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">
    <g>
      <rect x="70" y="220" width="220" height="120" rx="16" fill="#14532d" stroke="#4ade80"/>
      <text x="180" y="290" fill="#ecfdf5">1. Choose</text>
    </g>
    <g>
      <rect x="310" y="220" width="220" height="120" rx="16" fill="#1e3a8a" stroke="#60a5fa"/>
      <text x="420" y="290" fill="#eff6ff">2. Preview</text>
    </g>
    <g>
      <rect x="550" y="220" width="220" height="120" rx="16" fill="#5b21b6" stroke="#c084fc"/>
      <text x="660" y="290" fill="#f5f3ff">3. Configure</text>
    </g>
    <g>
      <rect x="790" y="220" width="220" height="120" rx="16" fill="#7c2d12" stroke="#fdba74"/>
      <text x="900" y="290" fill="#fff7ed">4. Validate</text>
    </g>
    <g>
      <rect x="1030" y="220" width="220" height="120" rx="16" fill="#0f766e" stroke="#5eead4"/>
      <text x="1140" y="290" fill="#f0fdfa">5. Customize</text>
    </g>
  </g>
  <g stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
      </marker>
    </defs>
    <line x1="290" y1="280" x2="310" y2="280"/>
    <line x1="530" y1="280" x2="550" y2="280"/>
    <line x1="770" y1="280" x2="790" y2="280"/>
    <line x1="1010" y1="280" x2="1030" y2="280"/>
  </g>
  <text x="640" y="430" text-anchor="middle" fill="#9ca3af" font-size="24" font-family="Inter, Arial, sans-serif">Reusable scaffolds + AI edits + validation gates = faster and safer project kickoff</text>
</svg>
