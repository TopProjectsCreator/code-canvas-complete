name: Rewrite Author to Codex
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  rewrite-history:
    if: startsWith(github.head_ref, 'codex/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for rewriting
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite Commits
        run: |
          git config user.name "codex"
          git config user.email "codex@users.noreply.github.com"
          
          # This command goes back and re-signs all commits in the branch as 'codex'
          git rebase --root --exec "git commit --amend --author='codex <codex@users.noreply.github.com>' --no-edit"
          
          # Force push the rewritten history back to the PR branch
          git push origin ${{ github.head_ref }} --force
